# Use port 0 to find a random available port during tests
app.tcp-port=0

# Mock Infrastructure
app.bootstrap-servers=localhost:9092
app.kafka-topic=test-iso-topic

# Default Market for Testing
app.market=USA

# Testing specific overrides
spring.main.allow-bean-definition-overriding=true
spring.kafka.bootstrap-servers=${app.bootstrap-servers}

# Reduce logging noise during test runs
logging.level.org.apache.kafka=WARN
logging.level.org.springframework=INFO

app.mapping-rules.r1=35=8=execution-report
app.mapping-rules.r2=35=D=new-order-single

# Give the app 5 seconds to finish sending messages before killing it
spring.kafka.producer.cleanup-timeout=5s